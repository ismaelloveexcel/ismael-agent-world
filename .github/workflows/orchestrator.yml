name: Orchestrator

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      focus:
        description: "Focus area (leave blank for auto)"
        required: false
        default: ""
      phase:
        description: "Phase (1-5)"
        required: false
        default: "1"
  schedule:
    - cron: "0 7 * * 1-5"

concurrency:
  group: orchestrator
  cancel-in-progress: false

jobs:
  orchestrate:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'agent/'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests --quiet
      - name: Run orchestrator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          FOCUS_INPUT: ${{ github.event.inputs.focus || '' }}
          PHASE_INPUT: ${{ github.event.inputs.phase || '1' }}
        run: python .github/scripts/orchestrator.py
