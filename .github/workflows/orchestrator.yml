name: Orchestrator

on:
  # Auto-trigger: runs after any agent PR is merged into main
  pull_request:
    types: [closed]
    branches: [main]

  # Manual trigger (for first run or re-running a specific phase/focus)
  workflow_dispatch:
    inputs:
      focus:
        description: "Focus area (optional — e.g. 'landing page', 'agents panel')"
        required: false
        default: ""
      phase:
        description: "Phase to work on (1 or 2)"
        required: false
        default: "1"

  # Fallback schedule: weekdays 7am UTC in case auto-trigger misses
  schedule:
    - cron: "0 7 * * 1-5"

jobs:
  orchestrate:
    # For PR events: only run if it was an agent PR that was merged
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'agent/'))

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Run orchestrator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          FOCUS_INPUT: ${{ github.event.inputs.focus || '' }}
          PHASE_INPUT: ${{ github.event.inputs.phase || '1' }}
        run: python .github/scripts/orchestrator.py
